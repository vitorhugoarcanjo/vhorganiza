{% extends "tela_base_pos_login/base.html" %}

{% block title %}Editar Transação #{{ sequencia }}{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ static_v('pasta_financas/crud/pasta_edit/edit.css') }}">
{% endblock %}

{% block content %}

<div class="finance-wrapper">

    <div class="form-fin-card">

        <div class="form-fin-header">
            <h2>Editar Transação #{{ sequencia }}</h2>
            <p>Altere os dados abaixo</p>
        </div>

        <div class="form-body">

            <form method="POST">

                <!-- TIPO -->
                <div class="form-group">
                    <label>Tipo de Transação</label>
                    <select name="tipo" class="form-select" required>
                        <option value="receita" {% if transacao[2] == 'receita' %}selected{% endif %}>💰 Receita</option>
                        <option value="despesa" {% if transacao[2] == 'despesa' %}selected{% endif %}>💸 Despesa</option>
                    </select>
                </div>

                <!-- CATEGORIA -->
                <div class="form-group">
                    <label>Categoria</label>
                    <select name="categoria_id" class="form-select">
                        <option value="">Sem categoria</option>

                        {% for cat in categorias %}
                        <option value="{{ cat[0] }}"
                            {% if transacao[6] == cat[0] %}selected{% endif %}>
                            {{ cat[1] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- GRID -->
                <div class="form-grid">

                    <div class="form-group">
                        <label>Valor Total</label>
                        <!-- 🔥 MUDOU para text com classe money-input -->
                        <input type="text" 
                               name="valor_total" 
                               id="valor_total"
                               class="form-input money-input" 
                               value="{{ transacao[3] }}"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Descrição</label>
                        <input type="text"
                               name="descricao"
                               value="{{ transacao[4] }}"
                               class="form-input"
                               required>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Data Emissão</label>
                        <input type="date"
                               name="data_emissao"
                               value="{{ transacao[5] }}"
                               class="form-input"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Data Vencimento</label>
                        <input type="date"
                               name="data_vencimento"
                               value="{{ transacao[10] }}"
                               class="form-input">
                    </div>

                </div>

                <!-- ACTIONS -->
                <div class="form-actions">

                    <a href="{{ url_for('financas.inifinancas') }}" class="btn btn-secondary">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-primary">
                        Salvar Alterações
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<!-- 🔥 ADICIONA O JS DE FORMATAÇÃO -->
{% block scripts %}
    <script src="{{ static_v('js/pasta_financas/pasta_insert/format_valor.js') }}"></script>
{% endblock %}

{% endblock %}
