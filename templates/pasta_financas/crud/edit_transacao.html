<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static',filename='pasta_login_e_cadastre_se/global.css') }}">
    <title>Editar Transação</title>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Editar Transação #{{ sequencia }}</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            <!-- Tipo -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tipo</label>
                                <select name="tipo" class="form-select" required>
                                    <option value="receita" {% if transacao[2] == 'receita' %}selected{% endif %}>📈 Receita</option>
                                    <option value="despesa" {% if transacao[2] == 'despesa' %}selected{% endif %}>📉 Despesa</option>
                                </select>
                            </div>

                            <!-- Valor -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Valor</label>
                                <input type="number" name="valor_total" step="0.01" 
                                       class="form-control" value="{{ transacao[3] }}" required>
                            </div>

                            <!-- Descrição -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Descrição</label>
                                <input type="text" name="descricao" class="form-control" 
                                       value="{{ transacao[4] }}" required>
                            </div>

                            <!-- Data Emissão -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Data Emissão</label>
                                <input type="date" name="data_emissao" class="form-control" 
                                       value="{{ transacao[5] }}" required>
                            </div>

                            <!-- Data Vencimento -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Data Vencimento</label>
                                <input type="date" name="data_vencimento" class="form-control" 
                                       value="{{ transacao[8] }}">
                            </div>

                            <!-- Categoria -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Categoria</label>
                                <input type="text" name="categoria" class="form-control" 
                                       value="{{ transacao[6] }}">
                            </div>

                            <!-- Status -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Status</label>
                                <select name="status" class="form-select">
                                    <option value="aberto" {% if transacao[7] == 'aberto' %}selected{% endif %}>Aberto</option>
                                    <option value="quitado" {% if transacao[7] == 'quitado' %}selected{% endif %}>Quitado</option>
                                    <option value="recebido" {% if transacao[7] == 'recebido' %}selected{% endif %}>Recebido</option>
                                </select>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">💾 Salvar</button>
                                <a href="{{ url_for('financas.inifinancas') }}" class="btn btn-secondary">↩️ Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
