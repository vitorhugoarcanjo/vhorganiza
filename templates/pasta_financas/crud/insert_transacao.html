{% extends "tela_base_pos_login/base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ static_v('pasta_financas/crud/pasta_insert/import_css.css') }}">
{% endblock %}

{% block content %}

<div class="finance-wrapper">

    <div class="form-fin-card">

        <!-- HEADER -->
        <div class="form-fin-header">
            <h2><i class="bi bi-cash-coin"></i> Nova Transação</h2>
            <p>Registre uma entrada ou saída financeira no sistema</p>
        </div>

        <!-- BODY -->
        <div class="form-body">

            <form action="{{ url_for('nova_transacao.initransacao') }}" method="post">

                <div class="form-group">
                    <label>Tipo de Transação</label>
                    <select name="tipo" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="receita">💰 Receita (Entrada)</option>
                        <option value="despesa">💸 Despesa (Saída)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Categoria</label>

                    <select name="categoria_id" class="form-select" required>
                        <option value="">Selecione a categoria...</option>

                        {% for cat in categorias %}
                            <option value="{{ cat[0] }}">{{ cat[1] }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-grid">

                    <div class="form-group">
                        <label>Valor Total</label>
                        <input 
                        type="text"
                        name="valor_total"
                        id="valor_total"
                        class="form-input money-input" 
                        required>
                    </div>

                    <div class="form-group">
                        <label>Descrição</label>
                        <input type="text" name="descricao" class="form-input" placeholder="Ex: Salário" required>
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Data Emissão</label>
                        <input type="date" name="data_emissao" class="form-input" value="{{ hoje }}" required>
                    </div>

                    <div class="form-group">
                        <label>Data Vencimento</label>
                        <input type="date" name="data_vencimento" class="form-input" value="{{ hoje }}">
                    </div>
                </div>

                <div class="form-actions">

                    <a href="{{ url_for('financas.inifinancas') }}" class="btn btn-secondary">
                        Cancelar
                    </a>

                    <button type="reset" class="btn btn-secondary">
                        Limpar
                    </button>

                    <button type="submit" class="btn btn-primary">
                        Salvar Transação
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% block scripts %}
    <script src="{{ static_v('js/pasta_financas/pasta_insert/format_valor.js') }}"></script>
{% endblock %}

{% endblock %}
