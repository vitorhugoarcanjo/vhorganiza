<div class="modal-detalhes-overlay" id="modalDetalhesTransacao" onclick="fecharModalDetalhesTransacao(event)">
    <div class="modal-detalhes-container" onclick="event.stopPropagation()">
        
        <!-- HEADER -->
        <div class="modal-detalhes-header">
            <span class="modal-detalhes-title">
                <i class="bi bi-info-circle me-2"></i>Detalhes da Transação
            </span>
            <button type="button" class="modal-detalhes-close" onclick="fecharModalDetalhesTransacao(null)">&times;</button>
        </div>
        
        <!-- BODY -->
        <div class="modal-detalhes-body" id="conteudoDetalhesTransacao">
            <!-- O conteúdo será preenchido via JS -->
            <div class="spinner-pure"></div>
        </div>
        
        <!-- FOOTER -->
        <div class="modal-detalhes-footer" style="display: flex; justify-content: flex-end; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border-sutil);">
            <button type="button" class="btn-pure-detalhes" style="background: var(--bg-principal); padding: 6px 16px; border-radius: 4px; border: 1px solid var(--border-sutil); cursor: pointer;" onclick="fecharModalDetalhesTransacao(null)">
                Fechar
            </button>
        </div>
        
    </div>
</div>
