<!-- MODAL CONFIGURAR COLUNAS -->
<div id="modalColunas" class="modal-colunas" style="display: none;">
    <div class="modal-colunas-content">
        <div class="modal-colunas-header">
            <h3><i class="bi bi-layout-three-columns"></i> Configurar Colunas</h3>
            <button class="modal-colunas-close">&times;</button>
        </div>
        
        <div class="modal-colunas-body">
            <div class="colunas-container">
                <div class="colunas-lista">
                    <div class="colunas-titulo">📋 Colunas Visíveis</div>
                    <div id="colunasVisiveis" class="colunas-itens"></div>
                </div>
                
                <div class="colunas-acoes">
                    <button id="moverDireita" class="btn-mover" title="Mover para ocultas">→</button>
                    <button id="moverEsquerda" class="btn-mover" title="Mover para visíveis">←</button>
                </div>
                
                <div class="colunas-lista">
                    <div class="colunas-titulo">👁️ Colunas Ocultas</div>
                    <div id="colunasOcultas" class="colunas-itens"></div>
                </div>
            </div>
        </div>
        
        <div class="modal-colunas-footer">
            <button class="btn-modal-resetar" id="btnResetarColunas">↺ Resetar Padrão</button>
            <button class="btn-modal-cancelar" id="btnCancelarColunas">Cancelar</button>
            <button class="btn-modal-salvar" id="btnSalvarColunas">Salvar</button>
        </div>
    </div>
</div>
