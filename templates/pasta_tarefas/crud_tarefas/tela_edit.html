{% extends "tela_base_pos_login/base.html" %}

{% block title %}Editar Tarefa{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='pasta_tarefas/crud/pasta_insert/insert.css') }}">
{% endblock %}

{% block content %}
<div class="container-task">
    <div class="card-task">
        <div class="card-task-header">
            <div class="header-align">
                <h2 class="title-main">
                    <i class="bi bi-pencil-square"></i> Editar Tarefa
                </h2>
                <a href="{{ url_for('tarefas.ini_tarefas') }}" class="btn-action btn-back">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
            </div>
            <p class="subtitle-main">Modifique os campos necessários e salve as alterações</p>
        </div>

        <div class="card-task-body">
            <form method="post" action="{{ url_for('editar_tarefa.iniedittarefa', tarefa_seq=tarefa_seq) }}">
                
                <div class="form-group">
                    <label class="label-form"><i class="bi bi-type"></i> Título</label>
                    <input type="text" name="titulo" class="input-form" value="{{ tarefa[0] }}" required>
                </div>

                <div class="form-group">
                    <label class="label-form"><i class="bi bi-file-text"></i> Descrição</label>
                    <textarea name="descricao" class="input-form textarea-form">{{ tarefa[1] }}</textarea>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <label class="label-form"><i class="bi bi-check-circle"></i> Status</label>
                        <select name="status" class="select-form">
                            <option value="pendente" {% if tarefa[2] == 'pendente' %}selected{% endif %}>⏳ Pendente</option>
                            <option value="em andamento" {% if tarefa[2] == 'em andamento' %}selected{% endif %}>⚡ Em andamento</option>
                            <option value="concluido" {% if tarefa[2] == 'concluido' %}selected{% endif %}>✅ Concluído</option>
                        </select>
                    </div>
                    <div class="form-col">
                        <label class="label-form"><i class="bi bi-flag"></i> Prioridade</label>
                        <select name="prioridade" class="select-form">
                            <option value="baixa" {% if tarefa[6] == 'baixa' %}selected{% endif %}>🟢 Baixa</option>
                            <option value="media" {% if tarefa[6] == 'media' %}selected{% endif %}>🟡 Média</option>
                            <option value="alta" {% if tarefa[6] == 'alta' %}selected{% endif %}>🔴 Alta</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <label class="label-form"><i class="bi bi-calendar-plus"></i> Início</label>
                        <input type="date" name="data_inicio" class="input-form" value="{{ tarefa[3] }}">
                    </div>
                    <div class="form-col">
                        <label class="label-form"><i class="bi bi-calendar-check"></i> Prazo</label>
                        <input type="date" name="data_final" class="input-form" value="{{ tarefa[4] }}">
                    </div>
                </div>

                <div class="form-group">
                    <label class="label-form"><i class="bi bi-tags"></i> Categoria</label>
                    <select name="categoria_id" class="select-form">
                        <option value="">⚠️ Sem categoria</option>
                        {% for cat in todas_categorias %}
                        <option value="{{ cat[0] }}" 
                                style="background-color: {{ cat[2] }}; color: white !important;" 
                                {% if cat[0] == tarefa[5] %}selected{% endif %}>
                            {{ cat[1] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-action btn-submit" style="width: 100%;">
                        <i class="bi bi-save"></i> Atualizar Tarefa
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Ajuste automático da altura do textarea
    const textarea = document.querySelector('.textarea-form');
    function adjustHeight() {
        textarea.style.height = '60px';
        textarea.style.height = (textarea.scrollHeight) + 'px';
    }
    textarea.addEventListener('input', adjustHeight);
    window.addEventListener('load', adjustHeight); // Ajusta ao carregar
</script>
{% endblock %}
