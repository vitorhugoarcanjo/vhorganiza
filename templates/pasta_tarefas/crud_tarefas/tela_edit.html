<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tarefa</title>
    <!-- BOOTSTRAP 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CUSTOMIZAÇÕES SIMPLES */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .edit-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .btn-atualizar {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            border: none;
        }
        .btn-atualizar:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(17,153,142,0.4);
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-6">
                <!-- CARD PRINCIPAL -->
                <div class="card edit-card p-4">
                    <div class="card-header bg-primary text-white text-center mb-4">
                        <h2 class="mb-0">✏️ Editar Tarefa</h2>
                    </div>

                    <form method="post" action="{{ url_for('editar_tarefa.iniedittarefa', tarefa_seq=tarefa_seq) }}">
                        <!-- TITULO -->
                        <div class="mb-3">
                            <label class="form-label text-white">Título</label>
                            <input type="text" name="titulo" class="form-control bg-dark text-white border-secondary" 
                                value="{{ tarefa[0] }}" required>
                        </div>


                        <!-- DESCRIÇÃO -->
                        <div class="mb-4">
                            <label class="form-label fw-bold fs-5">Descrição</label>
                            <textarea class="form-control" rows="4" name="descricao" 
                                    placeholder="Digite a descrição da tarefa...">{{ tarefa[1] }}</textarea>
                        </div>

                        <!-- STATUS + PRIORIDADE -->
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Status</label>
                                <select class="form-select form-select-lg" name="status">
                                    <option value="pendente" {% if tarefa[2] == 'pendente' %}selected{% endif %}>⏳ Pendente</option>
                                    <option value="em andamento" {% if tarefa[2] == 'em andamento' %}selected{% endif %}>⚡ Em andamento</option>
                                    <option value="concluido" {% if tarefa[2] == 'concluido' %}selected{% endif %}>✅ Concluído</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Prioridade</label>
                                <select class="form-select form-select-lg" name="prioridade">
                                    <option value="baixa" {% if tarefa[6] == 'baixa' %}selected{% endif %}>🟢 Baixa</option>
                                    <option value="media" {% if tarefa[6] == 'media' %}selected{% endif %}>🟡 Média</option>
                                    <option value="alta" {% if tarefa[6] == 'alta' %}selected{% endif %}>🔴 Alta</option>
                                </select>
                            </div>
                        </div>

                        <!-- DATAS -->
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Data Início</label>
                                <input type="date" class="form-control form-control-lg" name="data_inicio" value="{{ tarefa[3] }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Data Final</label>
                                <input type="date" class="form-control form-control-lg" name="data_final" value="{{ tarefa[4] }}">
                            </div>
                        </div>

                        <!-- CATEGORIA (SEU ESTILO GENIAL!) -->
                        <div class="mb-4">
                            <label class="form-label fw-bold fs-5">Categoria</label>
                            <select class="form-select form-select-lg" name="categoria_id">
                                <option value="">⚠️ Sem categoria</option>
                                {% for cat in todas_categorias %}
                                <option value="{{ cat[0] }}" 
                                        style="background-color: {{ cat[2] }}; color: white !important;" 
                                        {% if cat[0] == tarefa[5] %}selected{% endif %}>
                                    {{ cat[1] }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- BOTÕES -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('tarefas.ini_tarefas') }}" class="btn btn-outline-secondary btn-lg px-4">
                                ← Voltar
                            </a>
                            <button type="submit" class="btn btn-atualizar btn-lg px-4">
                                💾 Atualizar Tarefa
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- BOOTSTRAP JS (opcional, pra efeitos) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
