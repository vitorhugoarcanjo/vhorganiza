<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SCSS LOCAL -->
    <link rel="stylesheet" href="{{ url_for('static',filename='pasta_login_e_cadastre_se/global.css') }}">
</head>

<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <section class="vh-100 d-flex justify-content-center align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-4">
                    <form action="/login" method="post">
                        <div class="card shadow">
                            <div class="card-body p-4">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Digite seu nome ou E-mail:</label>
                                    <input type="text" class="form-control" name="nome_ou_email" placeholder="Digite seu nome ou E-mail">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Digite sua senha:</label>
                                    <input type="password" class="form-control" name="senha" placeholder="Digite sua senha">
                                </div>

                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn_submit btn-success fw-bold">Acessar</button>
                                    <button type="reset" class="btn btn_limpar btn-danger fw-bold">Limpar</button>
                                    <div class="d-flex gap-2 justify-content-center mt-3">
                                        <a href="{{ url_for('ini_app') }}" class="btn btn-outline-light btn-sm flex-fill">
                                            Início
                                        </a>
                                        <a href="{{ url_for('cadastre_se.tela_cadastre_se') }}" class="btn btn-warning btn-sm flex-fill">
                                            Cadastre-se
                                        </a>
                                    </div>
                                    <div class="text-center mt-3">
                                        <a href="{{ url_for('recuperar.solicitar_recuperacao') }}" class="text-decoration-none">Esqueci minha senha</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
