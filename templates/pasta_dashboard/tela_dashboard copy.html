<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Finanças</title>
    
    <!-- Bootstrap 5.3 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; 
        }
        .dashboard { padding: 2rem 0; }
        
        /* Cards Dashboard */
        .card-financeiro {
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            height: 100%;
        }
        .card-financeiro:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.2);
        }
        
        .valor {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        
        .positivo { color: #10b981 !important; }
        .negativo { color: #ef4444 !important; }
        
        .card-receita .bi { color: #10b981; }
        .card-despesa .bi { color: #ef4444; }
        .card-saldo .bi { 
            color: {% if saldo >= 0 %}#10b981{% else %}#ef4444{% endif %};
        }
        
        /* Filtros */
        .filtros-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2rem;
            margin-bottom: 3rem;
        }
        
        /* Responsivo */
        @media (max-width: 768px) {
            .valor { font-size: 2rem; }
            .filtros-section { margin: 1rem; padding: 1.5rem; }
        }
    </style>
</head>
<body class="bg-dark text-white">
    <div class="container-fluid dashboard">
        
        <!-- FILTROS -->
        <div class="filtros-section mx-auto" style="max-width: 800px;">
            <div class="row g-4 align-items-end">
                <div class="col-md-4 col-sm-6">
                    <label class="form-label fw-bold mb-2">
                        <i class="bi bi-calendar-event me-2"></i>Data Início
                    </label>
                    <input type="date" class="form-control form-control-lg" 
                           name="data_inicio" value="{{ data_inicio }}" required>
                </div>
                
                <div class="col-md-4 col-sm-6">
                    <label class="form-label fw-bold mb-2">
                        <i class="bi bi-calendar-check me-2"></i>Data Final
                    </label>
                    <input type="date" class="form-control form-control-lg" 
                           name="data_final" value="{{ data_final }}" required>
                </div>
                
                <div class="col-md-4 col-sm-12">
                    <button type="submit" class="btn btn-success btn-lg w-100 px-4">
                        <i class="bi bi-search me-2"></i>🔍 Filtrar
                    </button>
                </div>
            </div>
            
            <hr class="my-4 opacity-25">
            
            <div class="text-center">
                <a href="{{ url_for('pos_login.iniposlogin') }}" class="btn btn-outline-light btn-lg px-4">
                    <i class="bi bi-arrow-left me-2"></i>Voltar ao Menu
                </a>
            </div>
        </div>

        <!-- CARDS FINANCEIROS -->
        <div class="row g-4 cards">
            <!-- RECEITAS -->
            <div class="col-xl-4 col-lg-6 col-md-12">
                <div class="card-financeiro card-receita card h-100 text-center p-4 rounded-4 bg-transparent">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <i class="bi bi-graph-up-arrow display-4 mb-3"></i>
                        <h3 class="h2 fw-bold mb-3 text-white">Receitas</h3>
                        <div class="valor positivo">R$ {{ "%.2f"|format(total_receitas) }}</div>
                        <p class="text-white-50 mb-0 lead">Total de entradas</p>
                    </div>
                </div>
            </div>
            
            <!-- DESPESAS -->
            <div class="col-xl-4 col-lg-6 col-md-12">
                <div class="card-financeiro card-despesa card h-100 text-center p-4 rounded-4 bg-transparent">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <i class="bi bi-graph-down-arrow display-4 mb-3"></i>
                        <h3 class="h2 fw-bold mb-3 text-white">Despesas</h3>
                        <div class="valor negativo">R$ {{ "%.2f"|format(total_despesas) }}</div>
                        <p class="text-white-50 mb-0 lead">Total de saídas</p>
                    </div>
                </div>
            </div>
            
            <!-- SALDO -->
            <div class="col-xl-4 col-lg-12 col-md-12">
                <div class="card-financeiro card-saldo card h-100 text-center p-4 rounded-4 bg-transparent">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <i class="bi bi-cash-coin display-4 mb-3 {% if saldo >= 0 %}text-success{% else %}text-danger{% endif %}"></i>
                        <h3 class="h2 fw-bold mb-3 text-white">Saldo</h3>
                        <div class="valor {% if saldo >= 0 %}positivo{% else %}negativo{% endif %}">
                            R$ {{ "%.2f"|format(saldo) }}
                        </div>
                        <p class="text-white-50 mb-0 lead">Resultado final</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
