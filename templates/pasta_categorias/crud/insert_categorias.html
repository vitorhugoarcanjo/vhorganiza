{% extends "tela_base_pos_login/base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='pasta_categorias/crud/insert.css') }}">
{% endblock %}

{% block content %}
<div class="form-wrapper">
    <div class="card-custom">
        <h2>🏷️ Nova Categoria</h2>

        {% if msg %}
        <div style="background: var(--danger); padding: 10px; border-radius: 8px; margin-bottom: 20px;">
            {{ msg }}
        </div>
        {% endif %}

        <form method="post" action="{{ url_for('categorias.insert_categorias_global') }}">
            
            <div class="form-group">
                <label class="form-label">Nome da Categoria</label>
                <input type="text" name="nome" class="form-input" value="{{ nome or '' }}" placeholder="Ex: Trabalho, Estudos, Banco do brasil, caixa..." required>
            </div>

            <div class="form-group">
                <label class="form-label">Cor da Categoria</label>
                <div class="color-group">
                    <input type="color" name="cor" id="cor" class="color-input" value="{{ cor or '#3b82f6' }}">
                    <div id="preview" class="color-preview" style="background-color: {{ cor or '#3b82f6' }};"></div>
                    <span style="color: var(--text-muted); font-size: 0.85rem;">Escolha a cor</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Módulo</label>
                <select name="modulo" class="form-input" required>
                    <option value="" disabled {% if not modulo %}selected{% endif %}>Selecione o módulo</option>
                    <option value="tarefas" {% if modulo == 'tarefas' %}selected{% endif %}>📋 Tarefas</option>
                    <option value="financas" {% if modulo == 'financas' %}selected{% endif %}>💰 Finanças</option>
                </select>
            </div>

            <div class="btn-row">
                <button type="submit" class="btn-base btn-primary">Salvar Categoria</button>
                <a href="{{ url_for('categorias.listar_categorias') }}" class="btn-base btn-outline">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script>
    const cp = document.getElementById('cor');
    const prev = document.getElementById('preview');
    cp.addEventListener('input', () => prev.style.backgroundColor = cp.value);
</script>
{% endblock %}
